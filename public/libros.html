<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Libros</title>


    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <h1>Gestión de Libros</h1>

    <!-- FORM -->
    <form id="formLibro">
        <input type="text" id="titulo" placeholder="Título" required>
        <input type="text" id="autor" placeholder="Autor" required>
        <input type="text" id="editorial" placeholder="Editorial" required>
        <input type="number" id="anio" placeholder="Año" required>
        <button type="submit">Agregar</button>
    </form>

    <!-- LISTADO -->

    <h2>Listado de Libros</h2>
    <hr>
    <div id="listaLibros"></div>

    <!-- MODAL -->
    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <h3>Editar Libro</h3>

            <input type="hidden" id="editIndex">

            <input type="text" id="editTitulo" placeholder="Título">
            <input type="text" id="editAutor" placeholder="Autor">
            <input type="text" id="editEditorial" placeholder="Editorial">
            <input type="number" id="editAnio" placeholder="Año">

            <br>
            <button onclick="guardarEdicion()">Guardar</button>
            <button onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>

</html>
